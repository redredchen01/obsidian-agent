# Dynamic Watermark Removal Tool — Demo Config
# All fields have defaults; only input.path is required.

input:
  path: "sample.mp4"        # 必填：輸入影片路徑
  start_sec: null           # 可選：開始時間（秒），null = 從頭
  end_sec: null             # 可選：結束時間（秒），null = 到結尾

detection:
  backend: "easyocr"        # easyocr | paddleocr（paddleocr 為 v2 選項）
  detect_interval: 10       # 每 N 幀偵測一次（降低 OCR 開銷）
  bbox_padding: 6           # bbox 四邊擴展像素
  confidence_threshold: 0.3 # OCR 置信度最低門檻
  min_area: 200             # 最小 bbox 面積（過濾雜訊）
  edge_region_only: false   # true = 只保留靠近邊緣的 bbox

tracking:
  iou_threshold: 0.1        # IoU 最低值才視為同一 track
  center_dist_threshold: 80 # 中心距離 < 此值也視為同一 track
  ema_alpha: 0.5            # EMA 平滑係數（0=最平滑，1=不平滑）
  gap_tolerance: 5          # 允許連續漏偵測幀數（超過則終止 track）

mask:
  expand_px: 4              # bbox 擴張像素（增加遮蓋容錯）
  feather_radius: 0         # 軟邊半徑（0=hard edge）

remove:
  strategy: "gaussian_blur" # gaussian_blur | solid | delogo
  blur_ksize: 51            # Gaussian blur 核大小（必須為奇數）
  solid_color: [0, 0, 0]    # solid 策略填充顏色（BGR）
  delogo_band: 4            # ffmpeg delogo band 寬度

watermark:
  enabled: true             # false = 跳過水印疊加
  type: "text"              # text | image
  text: "© 2026"            # 文字水印內容
  image_path: null          # PNG 水印路徑（type=image 時使用）
  position: "bottom-right"  # top-left | top-right | bottom-left | bottom-right | center
  opacity: 0.7              # 不透明度（0.0-1.0）
  scale: 1.0                # 文字大小縮放
  margin: 20                # 距邊緣像素
  start_sec: null           # 水印出現時間（null = 全程）
  end_sec: null             # 水印結束時間（null = 全程）

debug:
  enabled: false            # true = 輸出各 Stage debug 影片
  output_dir: "debug"       # debug 輸出目錄
