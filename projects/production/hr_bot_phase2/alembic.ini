# Alembic Configuration
# This is the configuration file for the Alembic database migration tool.

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# %% can be used to escape % in the value
pythonpath = .

# Logging configuration
# Loggers will inherit from alembic.env logger
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Default to SQLite for development
# Override with DATABASE_URL environment variable
[development]
sqlalchemy.url = sqlite:///./hr_bot.db

[production]
sqlalchemy.url = postgresql://localhost/hr_bot
