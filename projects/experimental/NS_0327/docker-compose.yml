version: "3.8"
services:
  hr-bots:
    build: .
    env_file: .env
    volumes:
      - ./config.json:/app/config.json:ro
      - ./credentials.json:/app/credentials.json:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  hr-mcp:
    build: .
    env_file: .env
    volumes:
      - ./config.json:/app/config.json:ro
      - ./credentials.json:/app/credentials.json:ro
    command: ["python", "-m", "hr_admin_bots.cli", "mcp"]
    stdin_open: true
